<svg style="color:#0F2A33" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="logo-svg" role="img" aria-label="Seal the Deal">
    <circle cx="100" cy="100" r="93" fill="none" stroke="currentColor" stroke-width="1.6" />
    
    <defs>
      <path id="badgeB-top" d="M 22 100 A 78 78 0 0 1 178 100" />
      <path id="badgeB-bot" d="M 22 100 A 78 78 0 0 0 178 100" />
    </defs>
    <text font-family="Fraunces, serif" font-size="13" font-weight="500" letter-spacing="2.4" fill="currentColor">
      <textPath href="#badgeB-top" startOffset="50%" text-anchor="middle">seal the deal</textPath>
    </text>
    <text font-family="Fraunces, serif" font-size="13" font-weight="500" letter-spacing="2.4" fill="currentColor">
      <textPath href="#badgeB-bot" startOffset="50%" text-anchor="middle">genuine · seal · co</textPath>
    </text>
  
    
    <g transform="translate(100 110) scale(0.65) translate(-100 -100)" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Body: tear-drop / pear shape, narrow at top (head), wide at bottom (sitting on tail) -->
      <path d="
        M 96 50
        C 80 50, 72 64, 72 80
        C 72 96, 70 112, 76 130
        C 82 146, 100 156, 122 156
        C 144 156, 158 148, 162 134
        C 165 122, 158 110, 148 106
        C 138 102, 130 96, 126 86
        C 122 76, 120 64, 116 56
        C 112 50, 104 50, 96 50
        Z
      "/>
      <!-- Tail flippers spreading right at bottom -->
      <path d="M 156 144 C 172 142, 184 138, 188 130 C 184 128, 176 130, 168 134"/>
      <path d="M 158 152 C 172 156, 184 154, 184 146 C 178 144, 170 144, 162 148"/>
      <!-- Front flipper hanging down on left side of body -->
      <path d="M 76 100 C 66 110, 60 124, 64 138 C 70 134, 76 124, 80 116"/>
      <!-- Front flipper on right (smaller) -->
      <path d="M 130 110 C 132 122, 134 134, 142 138 C 144 132, 142 122, 138 114" stroke-width="2"/>
      <!-- Head dome (already part of body) - add eye -->
      <circle cx="100" cy="72" r="2.2" fill="currentColor" stroke="none"/>
      <circle cx="112" cy="72" r="2.2" fill="currentColor" stroke="none"/>
      <!-- Snout/nose -->
      <ellipse cx="106" cy="84" rx="3.5" ry="2.2" fill="currentColor" stroke="none"/>
      <!-- Smile -->
      <path d="M 100 90 Q 106 94, 112 90" stroke-width="1.6"/>
      <!-- Whisker dots -->
      <circle cx="96" cy="86" r="0.9" fill="currentColor" stroke="none"/>
      <circle cx="116" cy="86" r="0.9" fill="currentColor" stroke="none"/>
      <!-- Belly fold hint -->
      <path d="M 84 124 Q 110 130, 140 124" stroke-width="1.2" opacity="0.45"/>
    </g>
  
    <!-- Small wave divider beside the seal -->
    <path d="M 22 100 Q 26 96, 30 100 T 38 100" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M 162 100 Q 166 96, 170 100 T 178 100" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </svg>